services:
  minecraft:
    image: itzg/minecraft-server:java21
    container_name: minecraft-bot-server
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "1.20.4"
      ONLINE_MODE: "FALSE"
      MEMORY: "2G"
      # 'easy' so hunger actually depletes (peaceful auto-refills it), giving
      # Atticus a baseline survival drive. SPAWN_MONSTERS=false suppresses
      # hostile mobs so combat doesn't dominate while we tune motivation.
      # Passive animals (sheep etc.) still spawn.
      DIFFICULTY: "easy"
      SPAWN_MONSTERS: "FALSE"
      MODE: "survival"
      # Force Atticus into survival on join even though his player file may
      # still remember creative from the previous run.
      FORCE_GAMEMODE: "TRUE"
      MAX_PLAYERS: "4"
      VIEW_DISTANCE: "8"
      SPAWN_PROTECTION: "0"
      ALLOW_FLIGHT: "TRUE"
      MOTD: "Minecraft Bot Dev Server"
      # World generation: NORMAL terrain with a FIXED SEED, so diamonds sit at
      # realistic depth (y≈-58) and reaching them requires the full tech tree +
      # descent — the long horizon the context-management experiment needs. The
      # fixed seed makes runs reproducible; the harness can vary SEED later to
      # replicate across biomes/spawns (paired: same seed for both arms).
      # IMPORTANT: world-gen changes only apply on a full regen. After editing
      # this, run `pnpm server:reset` (not just `server:up`).
      LEVEL: "bot-world-normal"
      LEVEL_TYPE: "minecraft:normal"
      SEED: "4815162342"
      # Auto-op the bots so they can teleport / use commands later.
      OPS: "Atticus,Brutus,Dimitri,Baseline"
    tty: true
    stdin_open: true
    restart: unless-stopped
    volumes:
      - ./data:/data
