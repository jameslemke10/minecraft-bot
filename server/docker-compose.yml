services:
  minecraft:
    image: itzg/minecraft-server:java21
    container_name: minecraft-bot-server
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "1.20.4"
      ONLINE_MODE: "FALSE"
      MEMORY: "2G"
      DIFFICULTY: "peaceful"
      MODE: "survival"
      # Force Atticus into survival on join even though his player file may
      # still remember creative from the previous run.
      FORCE_GAMEMODE: "TRUE"
      MAX_PLAYERS: "4"
      VIEW_DISTANCE: "8"
      SPAWN_PROTECTION: "0"
      ALLOW_FLIGHT: "TRUE"
      MOTD: "Minecraft Bot Dev Server"
      # World generation: single-biome forest. Normal terrain (with hills,
      # ponds, caves below) but the whole world is one biome. Forest gives
      # dense oak + birch trees, and villages do NOT spawn in forest biomes,
      # so Atticus starts in undisturbed wilderness.
      # To pick a different world, bump LEVEL (forces regen) and run
      # `pnpm server:reset`.
      LEVEL: "bot-world-forest"
      LEVEL_TYPE: "minecraft:single_biome"
      GENERATOR_SETTINGS: '{"biome":"minecraft:forest"}'
      # Auto-op the bot so it can teleport itself / use commands later
      OPS: "Atticus"
    tty: true
    stdin_open: true
    restart: unless-stopped
    volumes:
      - ./data:/data
