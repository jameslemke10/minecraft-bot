services:
  minecraft:
    image: itzg/minecraft-server:java21
    container_name: minecraft-bot-server
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "1.20.4"
      ONLINE_MODE: "FALSE"
      MEMORY: "2G"
      # 'easy' so hunger actually depletes (peaceful auto-refills it), giving
      # Atticus a baseline survival drive. SPAWN_MONSTERS=false suppresses
      # hostile mobs so combat doesn't dominate while we tune motivation.
      # Passive animals (sheep etc.) still spawn.
      DIFFICULTY: "easy"
      SPAWN_MONSTERS: "FALSE"
      MODE: "survival"
      # Force Atticus into survival on join even though his player file may
      # still remember creative from the previous run.
      FORCE_GAMEMODE: "TRUE"
      MAX_PLAYERS: "4"
      VIEW_DISTANCE: "8"
      SPAWN_PROTECTION: "0"
      ALLOW_FLIGHT: "TRUE"
      MOTD: "Minecraft Bot Dev Server"
      # World generation: SUPERFLAT plains with trees. Paper silently ignores
      # single_biome, so we use the flat preset which is 100% deterministic:
      # - biome plains (grass surface, animals spawn, sparse oak trees)
      # - features:true → scattered oaks, grass, flowers
      # - structures:{} → no villages
      # - lakes:false → no water holes
      # - layers lift the grass surface to y=64 (1 bedrock + 124 stone +
      #   3 dirt + 1 grass), so spawn is flat and low — no canopy/hills.
      # IMPORTANT: world-gen changes only apply on a full regen. After editing
      # this, run `pnpm server:reset` (not just `server:up`).
      LEVEL: "bot-world-flatplains"
      LEVEL_TYPE: "minecraft:flat"
      GENERATOR_SETTINGS: '{"biome":"minecraft:plains","features":true,"lakes":false,"structures":{},"layers":[{"block":"minecraft:bedrock","height":1},{"block":"minecraft:stone","height":124},{"block":"minecraft:dirt","height":3},{"block":"minecraft:grass_block","height":1}]}'
      # Auto-op the bot so it can teleport itself / use commands later
      OPS: "Atticus"
    tty: true
    stdin_open: true
    restart: unless-stopped
    volumes:
      - ./data:/data
